services:
  provider:
    build: .
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      CACHE_PATH: /app/data/cache.sqlite
      APPLE_COUNTRY: ${APPLE_COUNTRY:-GB}
      APPLE_LOCALE: ${APPLE_LOCALE:-en_GB}
      APPLE_STOREFRONT_ID: ${APPLE_STOREFRONT_ID:-143444}
      ENABLE_UTS_V3: ${ENABLE_UTS_V3:-false}
      ENABLE_APPLE_ARTWORK: ${ENABLE_APPLE_ARTWORK:-false}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - provider-data:/app/data

volumes:
  provider-data:
